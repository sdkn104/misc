<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document to Markdown Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background-color: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background-color: #efefff;
            transform: scale(1.02);
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .upload-subtext {
            color: #999;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .file-list {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .file-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-name {
            color: #333;
            font-size: 14px;
            flex: 1;
            word-break: break-all;
        }

        .file-size {
            color: #999;
            font-size: 12px;
            margin-right: 10px;
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }

        .remove-btn:hover {
            background: #ff5252;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:active {
            transform: translateY(0);
        }

        .convert-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .clear-btn {
            background: #e0e0e0;
            color: #333;
            flex: 1;
        }

        .clear-btn:hover {
            background: #d0d0d0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .status.loading {
            display: block;
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }

        .status.success {
            display: block;
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }

        .status.error {
            display: block;
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(25, 118, 210, 0.3);
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .supported-formats {
            margin-top: 30px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
        }

        .supported-formats strong {
            color: #333;
            display: block;
            margin-bottom: 8px;
        }

        .format-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .format-item {
            background: white;
            padding: 6px 10px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
        }

        .converter-select {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            border: 1px solid #e0e4ff;
        }

        .converter-select label.section-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
        }

        .converter-options {
            display: flex;
            gap: 12px;
        }

        .converter-option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .converter-option:has(input:checked) {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .converter-option input[type="radio"] {
            accent-color: #667eea;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .converter-option .opt-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .converter-option .opt-desc {
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Document to Markdown</h1>
        <p class="subtitle">複数のドキュメントをMarkdown/Text形式に変換</p>

        <form id="uploadForm">
            <div class="converter-select">
                <label class="section-label">変換エンジン</label>
                <div class="converter-options">
                    <label class="converter-option">
                        <input type="radio" name="converter" value="docling" checked>
                        <div>
                            <div class="opt-name">docling</div>
                            <div class="opt-desc">PDF・Word・PowerPoint 対応</div>
                        </div>
                    </label>
                    <label class="converter-option">
                        <input type="radio" name="converter" value="pdfminer">
                        <div>
                            <div class="opt-name">pdfminer</div>
                            <div class="opt-desc">PDF のみ・高速</div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="upload-area" id="uploadArea">
                <input type="file" id="fileInput" name="files" multiple accept=".pdf,.pptx,.doc,.docx">
                <div class="upload-icon">📁</div>
                <div class="upload-text">ファイルをドラッグ&ドロップ</div>
                <div class="upload-subtext">または、クリックして選択</div>
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="button-group">
                <button type="button" class="convert-btn" id="convertBtn" disabled>
                    <span id="convertBtnText">変換してダウンロード</span>
                </button>
                <button type="button" class="clear-btn" id="clearBtn">クリア</button>
            </div>

            <div class="status" id="status"></div>
        </form>

        <div class="supported-formats">
            <strong>対応形式:</strong>
            <div class="format-list">
                <div class="format-item">📕 PDF（.pdf）</div>
                <div class="format-item">📝 Word（.docx）</div>
                <div class="format-item">📊 PowerPoint（.pptx）</div>
                <div class="format-item">📈 Excel（.xlsx）</div>
                <div class="format-item">🌐 HTML（.html / .htm）</div>
                <div class="format-item">📄 Markdown（.md）</div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const convertBtn = document.getElementById('convertBtn');
        const clearBtn = document.getElementById('clearBtn');
        const status = document.getElementById('status');
        const convertBtnText = document.getElementById('convertBtnText');

        let selectedFiles = [];

        // ドラッグ&ドロップ
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });

        // クリックでファイル選択
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            addFiles(files);
        });

        function addFiles(files) {
            selectedFiles = files;
            updateFileList();
            clearStatus();
        }

        function updateFileList() {
            fileList.innerHTML = '';
            if (selectedFiles.length === 0) {
                convertBtn.disabled = true;
                return;
            }

            selectedFiles.forEach((file, index) => {
                const fileSize = (file.size / 1024 / 1024).toFixed(2);
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <span class="file-size">${fileSize} MB</span>
                    <button type="button" class="remove-btn" onclick="removeFile(${index})">削除</button>
                `;
                fileList.appendChild(fileItem);
            });

            convertBtn.disabled = false;
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            fileInput.value = '';
            updateFileList();
            clearStatus();
        });

        convertBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            if (selectedFiles.length === 0) {
                showStatus('ファイルを選択してください', 'error');
                return;
            }

            // API に送信
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            showStatus(
                `<span class="spinner"></span>
                ${selectedFiles.length}個のファイルを変換中...`,
                'loading'
            );
            convertBtn.disabled = true;

            try {
                const converter = document.querySelector('input[name="converter"]:checked').value;
                const response = await fetch(`/read/api/convert?converter=${converter}`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Conversion failed');
                }

                // ファイルをダウンロード
                const contentDisposition = response.headers.get('content-disposition');
                let filename = 'download';

                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?(.+?)"?$/);
                    if (filenameMatch) {
                        filename = filenameMatch[1];
                    }
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showStatus(
                    `✓ 成功! ${selectedFiles.length}個のファイルをダウンロードしました`,
                    'success'
                );

                // リセット
                setTimeout(() => {
                    selectedFiles = [];
                    fileInput.value = '';
                    updateFileList();
                    clearStatus();
                }, 2000);

            } catch (error) {
                console.error('Error:', error);
                showStatus(`❌ エラー: ${error.message}`, 'error');
                convertBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            status.className = `status ${type}`;
            status.innerHTML = message;
        }

        function clearStatus() {
            status.className = 'status';
            status.innerHTML = '';
        }
    </script>
</body>
</html>
