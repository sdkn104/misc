<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>返信生成アドイン</title>
  <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css"/>
</head>
<body>
  <header>
    <h1>返信生成</h1>
  </header>

  <div id="loading">
    <p>読み込み中...</p>
  </div>

  <main id="app" style="display:none;">
    <section class="card">
      <h2>メール情報</h2>
      <div class="info-row">
        <span class="label">件名</span>
        <span id="subject" class="value" title="">-</span>
      </div>
      <div class="info-row">
        <span class="label">送信者</span>
        <span id="sender" class="value">-</span>
      </div>
    </section>

    <section class="card">
      <h2>返信スタイル</h2>
      <select id="tone-select">
        <option value="formal">ビジネス丁寧（フォーマル）</option>
        <option value="casual">カジュアル</option>
        <option value="thankyou">お礼・感謝</option>
        <option value="acknowledge">確認・了解</option>
        <option value="decline">お断り（丁寧）</option>
      </select>
      <button id="generate-btn" class="btn btn-primary">返信を生成</button>
    </section>

    <section class="card">
      <h2>生成された返信</h2>
      <textarea id="reply-preview" rows="10" placeholder="「返信を生成」ボタンを押すと返信文が表示されます"></textarea>
      <div class="action-row">
        <button id="insert-btn" class="btn btn-primary" disabled>返信フォームに挿入</button>
        <button id="copy-btn" class="btn btn-secondary" disabled>コピー</button>
      </div>
    </section>

    <div id="status"></div>
  </main>

  <script src="taskpane.js"></script>
</body>
</html>
